
{% extends "base.html" %}
{% block content %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analyse Patient</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for cat, msg in messages %}
                <div class="alert alert-{{ cat }}">
                    {{ msg }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <h2 class="mb-4">Analyse patient</h2>

    <form method="POST" enctype="multipart/form-data">

        <div class="mb-3">
            <input class="form-control" type="text" name="name" placeholder="Nom" required>
        </div>

        <div class="mb-3">
            <input class="form-control" type="number" name="age" placeholder="Age" required>
        </div>

        <div class="mb-3">
            <input class="form-control" type="file" name="image" required>
        </div>

        <button class="btn btn-success">Analyser</button>

    </form>

</div>

</body>
</html>
{% endblock %}
